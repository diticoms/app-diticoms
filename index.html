
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Diticoms Service Manager</title>
    
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;background:red;color:white;z-index:999999;padding:20px;font-size:16px;width:100%;word-wrap:break-word;';
        errDiv.innerText = 'LỖI: ' + (e.message || e.error);
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;bottom:0;left:0;background:darkred;color:white;z-index:999999;padding:20px;font-size:16px;width:100%;word-wrap:break-word;';
        errDiv.innerText = 'LỖI Promise: ' + (e.reason ? e.reason.message || e.reason : 'Unknown');
        document.body.appendChild(errDiv);
      });
    </script>

    <link rel="stylesheet" href="index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f4ff',
                100: '#e0eaff',
                200: '#c7d9ff',
                300: '#a3c2ff',
                400: '#7a9fff',
                500: '#4d70ff',
                600: '#2b3eff',
                700: '#1e24fa',
                800: '#181fc8',
                900: '#181fa3',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
              'card': '0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02)',
            }
          }
        }
      }
    </script>
    <script>
      // Khởi tạo process.env với API Key được cung cấp
      window.process = { 
        env: { 
          API_KEY: "AIzaSyDhBnux0ua8i7jLgT099Hq1r1uYxXbVkI8" 
        } 
      };
      
      // Hàm xóa splash screen
      window.removeSplash = function() {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            if(splash.parentNode) splash.parentNode.removeChild(splash);
          }, 600);
        }
      };

      // Tự động xóa splash nếu quá 6 giây mà JS chưa load xong (phòng lỗi mạng)
      setTimeout(window.removeSplash, 6000);
      
      // Xóa splash khi window load xong
      window.addEventListener('load', window.removeSplash);
    </script>


    <style>
      body { background: #f8fafc; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .splash-container {
        position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #ffffff; z-index: 9999999; transition: opacity 0.5s ease-in-out;
      }
      .loader-ring {
        width: 32px; height: 32px; border: 3px solid #f1f5f9; border-top-color: #2563eb; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="splash-container" id="splash">
        <img src="logo.png" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 24px;" onerror="this.src='logo.png'">
        <div class="loader-ring"></div>
        <p style="margin-top: 16px; font-weight: 700; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;">Đang khởi tạo hệ thống...</p>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
